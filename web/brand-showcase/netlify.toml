# Prefer GitHub Actions for builds (see .github/workflows/web-deploy-netlify.yml).
# Keep Base directory empty (repository root) if this site is linked in Netlify UI.
# `ignore = "exit 0"` skips Netlify’s own builder so deploys come from GHA via netlify-cli.
[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ttnleipzig/regenfass-brand-showcase build"
  publish = "web/brand-showcase/dist"
  ignore = "exit 0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
