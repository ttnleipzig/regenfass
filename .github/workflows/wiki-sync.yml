name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        id: clone_wiki
        continue-on-error: true
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Fail if wiki is not enabled
        if: steps.clone_wiki.outcome != 'success'
        run: |
          echo "::error::Failed to clone the GitHub Wiki repository."
          echo "::error::Enable Wikis for ${{ github.repository }} (Settings → Features → Wikis),"
          echo "::error::create an initial wiki page if needed, then re-run this workflow."
          exit 1

      - name: Force-sync docs/ into wiki
        run: |
          set -euo pipefail
          cd wiki
          # Remove everything except .git so the wiki exactly matches docs/
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a ../docs/. .
          # Drop MacOS junk if present
          rm -f .DS_Store || true

      - name: Commit and push wiki
        run: |
          set -euo pipefail
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          git commit -m "docs: sync wiki from docs/ @ ${GITHUB_SHA}"
          # Force push so the wiki tree always matches /docs exactly
          git push --force origin HEAD:master || git push --force origin HEAD:main
