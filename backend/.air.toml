root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ."
  entrypoint = ["./tmp/main", "--database-uri", "postgres://postgres:password@127.0.0.1:5434/regenfass?sslmode=disable"]
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "docker", "docs"]
  include_dir = []
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = false
